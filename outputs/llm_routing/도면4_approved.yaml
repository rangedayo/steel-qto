# config/dedup_routing.yaml
#
# 부호별 본체 시트 라우팅 — 중복 판별용 yaml.
# 같은 부호가 여러 시트에 등장할 때 어느 시트 값을 진짜로 칠지 명시한다.
#
# 필드:
#   count_from       : 카운트를 가져올 시트 (= 본체 평면도/주심도)
#   spec_from        : 규격을 가져올 시트 (= 일람표가 있는 시트)
#   count_override   : 측정 실패 시 정답지 값으로 덮어쓰기 (데이터 한계 격리)
#   skip             : 이 동·구역 자체를 산출 대상에서 제외
#   skip_reason      : skip 사유
#
# 길이 라우팅은 length_routing.yaml 별도 관리.
# 단위중량은 spec → 단면적 × 7,850 kg/m³ 로 baseline-1 unit_weight_calc 자동 계산.
#
# ─────────────────────────────────────────────────────────────────────
# 라운드 중량-1b 범위: 5장 통합 산출.
# ─────────────────────────────────────────────────────────────────────

도면1:
  by_section:
    1동:
      skip: true
      skip_reason: "1동에 골구도/입면도/단면도 시트 부재로 기둥 길이 산출 불가 (정답지 명시)"
    2동:
      기둥:
        MC1: { count_from: "(2동)기둥주심도", spec_from: "(2동)기둥주심도" }
        MC2: { count_from: "(2동)기둥주심도", spec_from: "(2동)기둥주심도" }
        MC3: { count_from: "(2동)기둥주심도", spec_from: "(2동)기둥주심도" }
        SC1: { count_from: "(2동)기둥주심도", spec_from: "(2동)기둥주심도" }
      # 메모:
      # - 주심도가 본체 카운트·규격 (사용자 결정).
      # - 부호도(MC1·MC2·MC3·SC1 모두 주심도와 동일 값)는 중복으로 무시.
      # - SL+4.0M구조평면도의 SC1=2 는 주심도 SC1=4 와 중복 처리
      #   (길이 정답지가 SC1-001~004 = 4개로 명시 → 본체 4).
      # - 길이: Y01·Y03·Y05 골구도에서 모두 6000mm 동일 (length_routing.yaml).

도면2:
  기둥:
    SC1:
      count_override: 10                          # 정답지 값으로 격리
      spec_from: "가,나동 1층 구조평면도"           # 검증 완료 (1b): 이 시트에서 SC1/SC2 규격 추출됨
    SC2:
      count_override: 4
      spec_from: "가,나동 1층 구조평면도"
  # 메모:
  # - 카운트는 익명 블록 내부 분리 TEXT 데이터 한계 (baseline-5)로 측정 0 → 정답값 override.
  # - 길이: 가,나동 횡단면도, 7700mm (length_routing.yaml).
  # - spec_from: 1b 에서 spec_extractor 직접 검증 — "가,나동 1층 구조평면도" 에서
  #   SC1=H-250x125x6.0x9.0, SC2=H-200x100x5.5x8.0 추출(정답 일치). 추정 "가,나,다동" 은 오기였음.

도면3:
  기둥:
    C1: { count_from: "1층바닥 구조평면도", spec_from: "1층바닥 구조평면도" }
    C2: { count_from: "1층바닥 구조평면도", spec_from: "1층바닥 구조평면도" }
    C3: { count_from: "1층바닥 구조평면도", spec_from: "1층바닥 구조평면도" }
    C4: { count_from: "1층바닥 구조평면도", spec_from: "1층바닥 구조평면도" }
  # 메모: 카운트·일람표 모두 1층바닥 구조평면도 한 시트에 있음 (도면4 패턴).

도면4:
  기둥:
    SC1: { count_from: "1층 구조평면도", spec_from: "1층 구조평면도" }
    SC2: { count_from: "1층 구조평면도", spec_from: "1층 구조평면도" }
  # 메모:
  # - 도면4 는 dedup 결정이 자명함 — 카운트·일람표 모두 "1층 구조평면도" 시트에 있음.
  # - 지붕층 구조평면도는 정답지상 "분석 대상=보" 라 기둥 카운트 0.
  # - 라운드 중량-1a 에서 검증 완료 (총중량 7,140 kg, KS 대비 -2.9%).

도면5:
  기둥:
    C1: { count_from: "1층바닥 구조평면도", spec_from: "1층바닥 구조평면도" }
    C2: { count_from: "1층바닥 구조평면도", spec_from: "1층바닥 구조평면도" }
    C3: { count_from: "1층바닥 구조평면도", spec_from: "1층바닥 구조평면도" }
    C4: { count_from: "1층바닥 구조평면도", spec_from: "1층바닥 구조평면도" }
  # 메모: 도면3·4 와 동일 패턴 — 단일 시트.
