# 길이 측정 라우팅 — 라운드 길이-1.
#
# 각 도면별로 기둥 길이 측정에 사용할 DXF 파일과 부호별 적용 범위를 정의한다.
# 정답지(reference_materials/도면_길이_정답지.xlsx)의 "측정 소스 도면" 컬럼과
# 1:1 대응한다.
#
# 설계 원칙
#   * 도면명·시트명 하드코딩은 이 yaml 에만 둔다 (1단계 원칙 5.5 그대로).
#   * 같은 도면에 여러 소스 파일이 있을 때, 모든 파일을 측정하고 결과를 합친다.
#   * `method` 는 measure.py 의 측정 방법 분류 키 — 향후 다른 방법이 필요할
#     때 추가만 하면 됨 (LINE 빈도, TEXT 추출 등).

drawings:
  도면1:
    sources:
      - file: sample_data/도면1-2동_Y01열골구도.dxf
        sheet_label: "(2동)Y01열골구도, (2동)Y03,Y05열골구도"
        applies_to: [MC1, MC2, SC1]
        method: dimension_max_vertical
      - file: sample_data/도면1-2동_Y03열골구도.dxf
        sheet_label: "(2동)Y01열골구도, (2동)Y03,Y05열골구도"
        applies_to: [MC1, MC2, MC3, SC1]
        method: dimension_max_vertical
      - file: sample_data/도면1-2동_Y05열골구도.dxf
        sheet_label: "(2동)Y01열골구도, (2동)Y03,Y05열골구도"
        applies_to: [MC1, MC2, MC3, SC1]
        method: dimension_max_vertical

  도면2:
    sources:
      - file: sample_data/도면2_가나동횡단면도.dxf
        sheet_label: "가,나동 횡단면도"
        applies_to: [SC1, SC2]
        method: dimension_max_vertical

  도면3:
    sources:
      - file: sample_data/도면3_종단면도.dxf
        sheet_label: "종단면도, 계단단면도"
        applies_to: [C1, C2, C3, C4]
        method: dimension_max_vertical
      - file: sample_data/도면3_계단단면도.dxf
        sheet_label: "종단면도, 계단단면도"
        applies_to: [C1, C2, C3, C4]
        method: dimension_max_vertical

  도면4:
    sources:
      - file: sample_data/도면4_종단면도.dxf
        sheet_label: "종단면도, 횡단면도"
        applies_to: [SC1, SC2]
        method: dimension_max_vertical
      - file: sample_data/도면4_횡단면도.dxf
        sheet_label: "종단면도, 횡단면도"
        applies_to: [SC1, SC2]
        method: dimension_max_vertical

  도면5:
    sources:
      - file: sample_data/도면5_주단면도1.dxf
        sheet_label: "주단면도1, 주단면도4"
        applies_to: [C1, C2, C3, C4]
        method: dimension_max_vertical
      - file: sample_data/도면5_주단면도4.dxf
        sheet_label: "주단면도1, 주단면도4"
        applies_to: [C1, C2, C3, C4]
        method: dimension_max_vertical

# ── 측정 방법별 파라미터 ────────────────────────────────────────────────────
methods:
  dimension_max_vertical:
    description: "세로 방향 DIMENSION 엔티티의 measurement 최댓값을 채택"
    # |dy| > |dx| * direction_ratio_threshold 이면 세로(V) 로 판정
    direction_ratio_threshold: 5.0
    # 100mm 미만 측정값은 디테일 치수로 보고 무시
    min_measurement: 100.0
