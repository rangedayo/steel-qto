# 시트명 매칭 fallback — 자동 매칭(exact/partial) 실패 케이스만 등록.
#
# 구조
#   <도면>:
#     "<표제부에서 추출된 raw 텍스트>": <정답지 시트명>   # 또는 [시트명, ...]
#
# 매칭 우선순위(sheet_name_matcher.match_sheet): exact → partial → fallback(여기) →
# unmatched. 즉 보편 룰(exact/partial)로 풀리면 이 파일은 쓰이지 않는다.
#
# 설계 원칙
#   * 보편 룰로 못 푸는 것만 등록(예: 표제부 텍스트가 정답지 시트명과 어휘가 전혀
#     다른 경우). 도면별 하드코딩 최소화.

# 라운드 베이스라인-4 (도면3)
#   입면도-2 시트: 사용자 파일의 표제부가 "(배면도)" 로만 추출돼 "입면도-2" 와
#   어휘가 겹치지 않음 → exact/partial 실패. 배면도/우측면도/배면도우측면도 통합·
#   분리본 모두 동일 표제부라 한 키로 처리. 카운트 0 시트라 결과 영향 없음.
도면3:
  "(배면도)": "입면도-2"
